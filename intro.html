<!DOCTYPE html>
<html>
<head>
    <title>My Stylish Web Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: #333;
        }

        h1 {
            color: white;
            background-color: #333;
            padding: 15px;
            border-radius: 10px;
        }

        p {
            font-size: 18px;
        }

        a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #ff9800;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background-color: #e68900;
        }

        img {
            margin-top: 15px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 30px auto;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }
    </style>

</head>
<body>

    <div class="card">
        <h1>Welcome to My Website</h1>
        <p>This is my first styled HTML program.</p>

        <h2>About Me</h2>
        <p>I am learning web development.</p>

        <a href="https://www.google.com">Visit Google</a><br>

        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRYU5TXVFogFGFASspv0C1QFeI6tfDIliD4Yw&s" alt="Sample Image">
    </div>

</body>
</html>
