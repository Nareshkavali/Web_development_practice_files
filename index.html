<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 2 Practice</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        img {
            width: 300px;
            display: block;
            margin: 20px auto;
            border-radius: 10px;
        }

        blockquote {
            background-color: #fff;
            border-left: 5px solid #007bff;
            margin: 20px 0;
            padding: 15px;
            font-style: italic;
        }

        .box {
            background-color: #ffffff;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">


        <div class="box">
            <p>This is a paragraph demonstrating basic HTML structure.</p>

            <p>
                Visit this website:
                <a href="https://google.com" target="_blank">Go to Google Website 
                </a>
            </p>

            <img src=https://clearlydecoded.com/assets/images/posts/2017-09-11-basic-html-document-structure/thumbnail-social-500x250.png alt="Sample Image">

            <p>Short Quote: <q>Practice makes perfect</q></p>

            <blockquote>
                "Success is not final, failure is not fatal: It is the courage to continue that counts."
            </blockquote>

        </div>

    </div>

</body>
</html>
